name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/job-scheduler

            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/iamprecieee/job-scheduler.git
            fi

            git fetch origin main
            git reset --hard origin/main


            # Backend Update
            cd backend
            uv sync
            source .venv/bin/activate
            if [ -f ../deploy/.env ]; then
              export $(grep -v '^#' ../deploy/.env | xargs)
              export DATABASE_URL="postgresql+asyncpg://${DB_USER:-jobuser}:${DB_PASSWORD:-jobpassword}@127.0.0.1:5432/${DB_NAME:-jobscheduler}"
              if ! grep -q "^DATABASE_URL=" ../deploy/.env; then
                echo "DATABASE_URL=$DATABASE_URL" >> ../deploy/.env
              else
                sed -i "s|^DATABASE_URL=.*|DATABASE_URL=$DATABASE_URL|g" ../deploy/.env
              fi
            fi
            alembic upgrade head || echo "No migrations or migration failed, skipping..."
            cd ..

            # Inject SSE buffering fix
            if ! grep -q "proxy_buffering off;" /etc/nginx/sites-available/job-scheduler; then
              sudo sed -i '/proxy_set_header X-Forwarded-Proto/a \
              # Disable buffering for Server-Sent Events (SSE)\n              proxy_buffering off;\n              proxy_cache off;\n              proxy_read_timeout 86400;' /etc/nginx/sites-available/job-scheduler
            fi

            # Update backend service config
            sudo cp deploy/job-scheduler.service /etc/systemd/system/job-scheduler.service
            sudo systemctl daemon-reload

            # Restart backend service
            sudo systemctl restart job-scheduler

            # Frontend Update
            cd frontend
            npm install
            VITE_API_BASE_URL=/api/v1 npm run build
            cd ..

            # Remove Nginx directives that break HTTP Keep-Alive
            sudo sed -i '/chunked_transfer_encoding off;/d' /etc/nginx/sites-available/job-scheduler
            sudo sed -i '/proxy_set_header Connection "";/d' /etc/nginx/sites-available/job-scheduler

            sudo systemctl reload nginx

            echo "Deployment completed successfully!"
